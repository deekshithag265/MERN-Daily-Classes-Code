<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Survey Form</title>
</head>
<body>
    <form action="">
        <fieldset>
            <legend align="center">Google Survey Form</legend>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required placeholder="Enter your name">
            <br><br>   
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email">
            <br><br>   
            <label for="phno">Phone Number:</label>
            <input type="tel" id="phno" name="phno" required placeholder="Enter your phone number">
            <br><br>
            <label for="ftech">Favorite Technology:</label>
            <input type="checkbox" id="ftech" name="ftech" value="html"> HTML
            <input type="checkbox" id="ftech" name="ftech" value="css"> CSS
            <input type="checkbox" id="ftech" name="ftech" value="  js"> JavaScript
            <input type="checkbox" id="ftech" name="ftech" value="python"> Python
            <input type="checkbox" id="ftech" name="ftech" value="other"> Other
            <br><br>
            <label for="feedback">Feedback:</label>
            <textarea id="feedback" name="feedback" required placeholder="Please provide your feedback..."></textarea>
            <br><br>
        </fieldset>
    </form>
</body>
</html>
