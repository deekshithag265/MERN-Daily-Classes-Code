<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" method="get">
        <fieldset style="background-image: linear-gradient(pink, white ,#000000 ); border-radius: 10px 50px; padding: 30px ; margin: 50px;">
            <legend align="center"> login form </legend>
            <label for="username">Username:</label>
            <input type="text" maxlength="7"  minlength="3" required name="username" id="username" placeholder="Enter username"> <br> <br>
            <label for="password">Password:</label>
            <input type="text" maxlength="12" minlength="8" required name="password" id="password" placeholder="Enter Password"> <br><br>
            <button type="submit">Login</button>
            <br><br>
            <button type="reset"> Cancel</button>
        </fieldset>
    </form>
</body>
</html>
