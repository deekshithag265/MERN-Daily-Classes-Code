<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 align="center">Registration Form</h1>
    <form action="">
        <fieldset>
            <legend align="center"> Registration Form</legend>
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" required>
            <br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <br><br>
            <label for="confirm_password">Confirm Password:</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
            <br><br>
            <label for="gender">Gender:</label>
            <input type="radio" id="male" name="Male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="Female">
            <label for="female">Female</label>
            <input type="radio" id="other" name="Other">
            <label for="other">Other</label>
            <br><br>
            <label for="hobbies">Hobbies:</label>
            <input type="checkbox" id="reading" name="reading" value="reading">
            <label for="reading">Reading</label>
             <input type="checkbox" id="listening" name="listening" value="listening">
            <label for="listening">Listening to Music</label>
             <input type="checkbox" id="traveling" name="traveling" value="traveling">
            <label for="traveling">Traveling</label> 
            <input type="checkbox" id="writing" name="writing" value="writing">
            <label for="writing">Writing</label>
            <br><br>
            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob">
            <br><br>
            <button type="submit"> Submit
            </button>
            
            <button type="reset"> Reset
            </button>
        </fieldset>
    </form>
</body>
</html>
