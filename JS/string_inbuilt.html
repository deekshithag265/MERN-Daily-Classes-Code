<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <script>
        let str="JavaScript"
        console.log(str.length);
        console.log(str.replace("Java","Type")); //replace doesn't effect the original value; used for single values
        //console.log(str);
        //console.log(str.replaceAll("a","T")); //All is used to replace every character
        console.log(str.split("a"));
        console.log(str.toUpperCase());
        console.log(str.toLowerCase());
        console.log(str.trimStart());
        console.log(str.charAt(4));
        console.log(str.includes("Js")); //only works if its side by side
        console.log(str.indexOf('a')); //either number or character; only used for starting
        console.log(str.lastIndexOf('a'));
        console.log(str.concat(" this is programming language"));
        console.log(str.slice(2,9));
        console.log("HELLO".toLowerCase());
        

    </script>
